# Builds the Vue app and deploys it to GitHub Pages on every push to main.
# One-time setup on GitHub: repo Settings -> Pages -> Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write      # needed to publish to Pages
  id-token: write   # needed by actions/deploy-pages

# Never run two deployments at once; newer pushes wait for the current one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build (outputs to dist/)
        run: npm run build

      - name: Upload the built site as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
